name: Link Audit

on:
  schedule:
    - cron: "0 14 * * 1" # Monday 14:00 UTC (one hour after market-pulse)
  workflow_dispatch: {}
  pull_request:
    paths:
      - "**/*.html"
      - "vercel.json"
      - "scripts/verify.mjs"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify internal links and referenced assets
        id: verify
        run: node scripts/verify.mjs 2>&1 | tee verify-output.txt

      # On a PR, a nonzero exit above already fails the check — nothing more to do.
      # On the weekly cron, open (or update) a tracking issue so a stale link is
      # visible without watching the Actions tab.
      - name: Open an issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('verify-output.txt', 'utf8'); } catch {}
            const title = 'Link audit: broken internal links or missing assets';
            const body = [
              'The weekly link audit found problems. Full output:',
              '',
              '```',
              output.trim() || '(no output captured)',
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'link-audit',
            });

            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['link-audit'],
              });
            }
